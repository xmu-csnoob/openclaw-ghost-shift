apiVersion: v1
kind: Namespace
metadata:
  name: ghost-shift
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ghost-shift-config
  namespace: ghost-shift
data:
  BIND_ADDR: "0.0.0.0"
  PORT: "3002"
  STATIC_DIR: /app/dist
  GATEWAY_URL: wss://gateway.example.com/ws
  GHOST_SHIFT_INSTANCE_ID: ghost-shift-production
  GHOST_SHIFT_USER_AGENT: ghost-shift-server/0.1.0
  GHOST_SHIFT_VERSION: 0.1.0
  DEVICE_IDENTITY_PATH: /var/lib/ghost-shift/device-identity.json
  PUBLIC_HISTORY_PATH: /var/lib/ghost-shift/public-history.jsonl
  PUBLIC_HISTORY_RETENTION_HOURS: "24"
  PUBLIC_HISTORY_INTERVAL_SECONDS: "30"
  REDIS_URL: ""
  CACHE_TTL_SECONDS: "5"
  CACHE_MEMORY_MAX_ENTRIES: "512"
  CACHE_WARM_ON_STARTUP: "true"
  LOG_LEVEL: info
  REQUEST_SLOW_THRESHOLD_MS: "250"
  ENABLE_INTERNAL_API: "false"
---
apiVersion: v1
kind: Secret
metadata:
  name: ghost-shift-secrets
  namespace: ghost-shift
type: Opaque
stringData:
  GATEWAY_TOKEN: replace-with-gateway-token
  PUBLIC_ID_SALT: replace-with-public-id-salt
  INTERNAL_API_TOKEN: ""
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ghost-shift-data
  namespace: ghost-shift
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ghost-shift
  namespace: ghost-shift
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ghost-shift
  template:
    metadata:
      labels:
        app: ghost-shift
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "3002"
    spec:
      containers:
        - name: ghost-shift
          image: ghcr.io/xmu-csnoob/openclaw-ghost-shift:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
              name: http
          envFrom:
            - configMapRef:
                name: ghost-shift-config
            - secretRef:
                name: ghost-shift-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/ghost-shift
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: ghost-shift-data
---
apiVersion: v1
kind: Service
metadata:
  name: ghost-shift
  namespace: ghost-shift
spec:
  selector:
    app: ghost-shift
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ghost-shift
  namespace: ghost-shift
spec:
  rules:
    - host: ghostshift.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ghost-shift
                port:
                  number: 80
